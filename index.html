<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini RPG AVANZADO</title>

    <!-- CSS BASE -->
    <link rel="stylesheet" href="css/base.css">

   
</head>

<body>

    <h1>Mini RPG AVANZADO</h1>

    <!-- 🔥 ESCENARIO -->
    <div id="escenario">
        <div id="gameArea"></div>
    </div>

    <!-- INFO JUGADOR -->
    <div id="infoJugador" class="caja">
        <h2>Jugador</h2>
        <div class="barra-vida">
            <div id="vidaJugadorFill"></div>
        </div>
        <p>Ataque: <span id="ataqueJugador">10</span></p>
        <p>Defensa: <span id="defensaJugador">5</span></p>
        <p>Magia: <span id="magiaJugador">0</span></p>
        <p>Nivel: <span id="nivelJugador">1</span></p>
        <p>Puntaje: <span id="puntaje">0</span></p>
    </div>

    <!-- ACCIONES -->
    <div id="acciones" class="caja">
        <h2>Acciones</h2>
        <button id="atacarBtn">Atacar</button>
        <button id="curarBtn">Usar Pocion (+20 Vida)</button>
        <button id="equiparArmaBtn">Equipar Arma (+5 Ataque)</button>
        <button id="equiparArmaduraBtn">Equipar Armadura (+3 Defensa)</button>
        <button id="aprenderMagiaBtn">Aprender Magia (+10 Ataque Magico)</button>
        <button id="abrirInventarioBtn">Inventario</button>
    </div>

    <!-- INVENTARIO -->
    <div id="ventanaInventario" class="ventana">
        <div class="ventana-contenido">
            <span id="cerrarInventario" class="cerrar">&times;</span>
            <h2>Inventario</h2>
            <ul id="listaInventario"></ul>
        </div>
    </div>

    <!-- MENSAJES -->
    <p id="mensaje" class="mensaje"></p>

    <!-- 🔥 ORDEN CORRECTO DE SCRIPTS -->
    <script src="js/esce.js"></script>   <!-- escenario -->
    <script src="js/main.js"></script>   <!-- juego -->
    <script src="js/func.js"></script>   <!-- modo dios -->

</body>
</html>
