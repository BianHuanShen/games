<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senda Épica</title>

    <!-- CSS BASE -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/pj.css">
    <link rel="stylesheet" href="css/barrammorpg.css"> <!-- NUEVO -->
    <link rel="stylesheet" href="css/respo.css">
</head>
<body>

<center><h1>Senda Épica</h1></center>

<!-- 🔥 NUEVO LAYOUT (NO rompe JS) -->
<div class="game-layout">

    <!-- ACCIONES -->
    <div id="acciones" class="caja">
        <h2>🎮 Acciones</h2>
        
        <button id="atacarBtn">⚔️ Atacar</button>
        <button id="curarBtn">🧪 Curar</button>
        <button id="equiparArmaBtn">⚔️ Equipar Espada</button>
        <button id="equiparDagaBtn">🗡️ Daga</button>
        <button id="equiparArcoBtn">🏹 Arco</button>
        <button id="equiparArmaduraBtn">🛡️ Equipar Armadura</button>
        <button id="equiparArmaduraEpicaBtn">🛡️ Armadura Épica</button>
        <button id="usarCristalBtn">💎 Usar Cristal</button>
        <button id="usarOrbeBtn">🔮 Usar Orbe</button>
        <button id="aprenderMagiaBtn">✨ Aprender Magia</button>
        <button id="equiparCascoBtn">⛑️ Casco</button>
        <button id="equiparCamisaBtn">👕 Camisa</button>
        <button id="equiparGuantesBtn">🧤 Guantes</button>
        <button id="equiparPantalonBtn">👖 Pantalón</button>
        <button id="equiparBotasBtn">👢 Botas</button>
        <button id="equiparCascoEpicoBtn">⛑️ Casco Épico</button>
        <button id="equiparBotasEpicasBtn">👢 Botas Épicas</button>
        <button id="equiparEspadaLegendariaBtn">⚔️ Espada Legendaria</button>
        <button id="equiparArmaduraLegendariaBtn">🛡️ Armadura Legendaria</button>
        <button id="abrirInventarioBtn">🎒 Inventario</button>
    </div>

    <!-- ESCENARIO (igual ID = NO rompe nada) -->
    <div id="escenario">
        <div id="gameArea"></div>
    </div>

    <!-- JUGADOR -->
    <div id="infoJugador" class="caja">
        <h2>🧙 Jugador</h2>

        <div class="barra-vida">
            <div id="vidaJugadorFill"></div>
        </div>

        <p>⚔️ Ataque: <span id="ataqueJugador">10</span></p>
        <p>🛡️ Defensa: <span id="defensaJugador">5</span></p>
        <p>✨ Magia: <span id="magiaJugador">0</span></p>
        <p>📈 Nivel: <span id="nivelJugador">1</span></p>
        <p>🏆 Puntaje: <span id="puntaje">0</span></p>
    </div>

</div>

<!-- INVENTARIO (SIN CAMBIOS) -->
<div id="ventanaInventario" class="ventana">
    <div class="ventana-contenido">
        <span id="cerrarInventario" class="cerrar">&times;</span>
        <h2>🎒 Inventario</h2>
        <ul id="listaInventario"></ul>
    </div>
</div>

<!-- 🔥 NUEVA BARRA MMORPG (NO interfiere con nada existente) -->
<div id="barraRPG">

    <!-- VIDA -->
    <div class="hud-bar">
        <div class="hud-label">❤️ Vida</div>
        <div class="hud-fill vida" id="vidaBarra"></div>
    </div>

    <!-- MAGIA -->
    <div class="hud-bar">
        <div class="hud-label">🔮 Magia</div>
        <div class="hud-fill magia" id="magiaBarra"></div>
    </div>

    <!-- SKILLS (aún no conectadas, pero seguras) -->
    <div class="skills">
        <button id="skill1">⚔️</button>
        <button id="skill2">🔥</button>
        <button id="skill3">❄️</button>
        <button id="skill4">💀</button>
    </div>

</div>

<p id="mensaje" class="mensaje"></p>

<!-- JS (MISMO ORDEN = IMPORTANTE) -->
<script src="js/ui.js"></script>
<script src="js/esce.js"></script>
<script src="js/items.js"></script>
<script src="js/darloot.js"></script>
<script src="js/main.js"></script>
<script src="js/reinicio.js"></script>
<script src="js/fnc.js"></script>

</body>
</html>
